<script>
const FIELDS = [
  { key: 'minute',  label: '分钟', name: 'Minute',  min: 0, max: 59,  hints: ['*','0','*/5','*/15','*/30','0-30'] },
  { key: 'hour',    label: '小时', name: 'Hour',    min: 0, max: 23,  hints: ['*','0','8','12','0,12','8-18'] },
  { key: 'day',     label: '日期', name: 'Day',     min: 1, max: 31,  hints: ['*','1','15','1,15','L','*/2'] },
  { key: 'month',   label: '月份', name: 'Month',   min: 1, max: 12,  hints: ['*','1','6','1-6','*/3','1,7'] },
  { key: 'weekday', label: '星期', name: 'Weekday', min: 0, max: 6,   hints: ['*','1','5','1-5','0,6','1,3,5'] },
];

const PRESETS = [
  { expr: '* * * * *',       desc: '每分钟执行一次' },
  { expr: '0 * * * *',       desc: '每小时整点执行' },
  { expr: '0 0 * * *',       desc: '每天 00:00 执行' },
  { expr: '0 9 * * *',       desc: '每天 09:00 执行' },
  { expr: '0 9 * * 1-5',     desc: '工作日 09:00 执行' },
  { expr: '0 0 * * 0',       desc: '每周日 00:00 执行' },
  { expr: '0 0 1 * *',       desc: '每月1日 00:00 执行' },
  { expr: '0 0 1 1 *',       desc: '每年1月1日执行' },
  { expr: '*/5 * * * *',     desc: '每5分钟执行一次' },
  { expr: '*/15 * * * *',    desc: '每15分钟执行一次' },
  { expr: '0 0,12 * * *',    desc: '每天 00:00 和 12:00' },
  { expr: '30 23 * * 5',     desc: '每周五 23:30 执行' },
];

let fieldValues = { minute: '*', hour: '*', day: '*', month: '*', weekday: '*' };

function buildFields() {
  const grid = document.getElementById('fieldsGrid');
  grid.innerHTML = '';
  FIELDS.forEach(f => {
    const card = document.createElement('div');
    card.className = 'field-card';
    card.innerHTML = `
      <div class="field-label">${f.label}</div>
      <div class="field-name">${f.name} (${f.min}-${f.max})</div>
      <input class="field-input" id="f_${f.key}" value="${fieldValues[f.key]}"
        oninput="onFieldChange('${f.key}', this)">
      <div class="field-hint">* 任意 / , - 范围/列表</div>
      <div class="quick-select">
        ${f.hints.map(h=>`<button class="quick-btn" onclick="setField('${f.key}','${h}')">${h}</button>`).join('')}
      </div>`;
    grid.appendChild(card);
  });
}

function setField(key, val) {
  fieldValues[key] = val;
  document.getElementById('f_' + key).value = val;
  document.getElementById('f_' + key).classList.remove('error');
  updateDisplay();
}

function onFieldChange(key, input) {
  fieldValues[key] = input.value.trim() || '*';
  input.classList.remove('error');
  updateDisplay();
}

function getExpr() {
  return `${fieldValues.minute} ${fieldValues.hour} ${fieldValues.day} ${fieldValues.month} ${fieldValues.weekday}`;
}

function updateDisplay() {
  const expr = getExpr();
  document.getElementById('cronExpr').textContent = expr;
  document.getElementById('cronDesc').textContent = describeCron(expr);
  document.getElementById('parseInput').value = expr;
  renderNextTimes(expr);
}

function resetFields() {
  FIELDS.forEach(f => { fieldValues[f.key] = '*'; });
  buildFields();
  updateDisplay();
}

function buildPresets() {
  const grid = document.getElementById('presetsGrid');
  grid.innerHTML = PRESETS.map(p => `
    <button class="preset-btn" onclick="applyPreset('${p.expr}')">
      <div class="preset-expr">${p.expr}</div>
      <div class="preset-desc">${p.desc}</div>
    </button>`).join('');
}

function applyPreset(expr) {
  const parts = expr.split(' ');
  fieldValues.minute  = parts[0];
  fieldValues.hour    = parts[1];
  fieldValues.day     = parts[2];
  fieldValues.month   = parts[3];
  fieldValues.weekday = parts[4];
  buildFields();
  updateDisplay();
}

function parseExpr() {
  const expr = document.getElementById('parseInput').value.trim();
  const parts = expr.split(/\s+/);
  if (parts.length !== 5) {
    document.getElementById('parseResult').innerHTML =
      `<div class="status err">❌ 无效的 CRON 表达式，需要 5 个字段（分 时 日 月 周）</div>`;
    return;
  }
  applyPreset(expr);
}

function renderNextTimes(expr) {
  try {
    const times = getNextTimes(expr, 8);
    const now = Date.now();
    const html = `<ul class="next-times">${times.map((t,i)=>`
      <li>
        <div class="time-index">${i+1}</div>
        <div class="time-val">${formatDate(t)}</div>
        <div class="time-rel">${relativeTime(t - now)}</div>
      </li>`).join('')}</ul>`;
    document.getElementById('parseResult').innerHTML =
      `<div style="margin-bottom:10px;font-size:0.8rem;color:var(--text2)">📅 接下来 8 次执行时间：</div>${html}`;
  } catch(e) {
    document.getElementById('parseResult').innerHTML =
      `<div class="status err">❌ 解析失败：${e.message}</div>`;
  }
}

// ---- CRON Next Time Calculator ----
function getNextTimes(expr, count) {
  const parts = expr.split(/\s+/);
  if (parts.length !== 5) throw new Error('格式错误');
  const [minF, hrF, dayF, monF, wdF] = parts;
  const results = [];
  let d = new Date();
  d.setSeconds(0, 0);
  d.setMinutes(d.getMinutes() + 1);
  let attempts = 0;
  while (results.length < count && attempts < 500000) {
    attempts++;
    if (matchField(monF, d.getMonth()+1, 1, 12) &&
        matchField(dayF, d.getDate(), 1, 31) &&
        matchField(wdF, d.getDay(), 0, 6) &&
        matchField(hrF, d.getHours(), 0, 23) &&
        matchField(minF, d.getMinutes(), 0, 59)) {
      results.push(new Date(d));
    }
    d.setMinutes(d.getMinutes() + 1);
  }
  return results;
}

function matchField(expr, val, min, max) {
  if (expr === '*') return true;
  for (const part of expr.split(',')) {
    if (part.startsWith('*/')) {
      const step = parseInt(part.slice(2));
      if ((val - min) % step === 0) return true;
    } else if (part.includes('-')) {
      const [a, b] = part.split('-').map(Number);
      if (val >= a && val <= b) return true;
    } else if (part === 'L') {
      return true; // simplified
    } else {
      if (parseInt(part) === val) return true;
    }
  }
  return false;
}

// ---- CRON Description ----
function describeCron(expr) {
  try {
    const [min, hr, day, mon, wd] = expr.split(/\s+/);
    const parts = [];
    if (min === '*' && hr === '*') parts.push('每分钟');
    else if (min === '*') parts.push(`每小时每分钟`);
    else if (min.startsWith('*/')) parts.push(`每 ${min.slice(2)} 分钟`);
    else if (hr === '*') parts.push(`每小时第 ${min} 分钟`);
    else parts.push(`${hr}:${min.padStart(2,'0')}`);
    if (wd !== '*') {
      const days = ['周日','周一','周二','周三','周四','周五','周六'];
      if (wd.includes('-')) {
        const [a,b] = wd.split('-').map(Number);
        parts.push(`每${days[a]}至${days[b]}`);
      } else if (wd.includes(',')) {
        parts.push(wd.split(',').map(d=>days[+d]).join('、'));
      } else parts.push(`每${days[+wd]}`);
    } else if (day !== '*') {
      if (day.startsWith('*/')) parts.push(`每 ${day.slice(2)} 天`);
      else parts.push(`每月${day}日`);
    } else {
      if (mon !== '*') parts.push(`${mon}月`);
    }
    return parts.join(' · ') + ' 执行';
  } catch { return ''; }
}

function formatDate(d) {
  return d.toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', weekday:'short' });
}

function relativeTime(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s} 秒后`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m} 分钟后`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h} 小时后`;
  return `${Math.floor(h/24)} 天后`;
}

function copyExpr() {
  const expr = getExpr();
  navigator.clipboard.writeText(expr).then(() => showToast('已复制：' + expr));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Init
buildFields();
buildPresets();
updateDisplay();
</script>
