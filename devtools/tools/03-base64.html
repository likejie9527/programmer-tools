<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 编码/解码 — DevKit</title>
<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8764762267426063" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared.css">
<style>
.mode-tabs { display:flex;gap:8px;margin-bottom:20px; }
.mode-tab { padding:8px 20px;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text3);transition:all 0.15s; }
.mode-tab.active { background:var(--accent);color:white;border-color:var(--accent); }
.image-drop-zone {
  border: 2px dashed var(--border2);
  border-radius: 10px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
}
.image-drop-zone:hover, .image-drop-zone.dragover {
  border-color: var(--accent);
  background: #f0f9ff;
}
.drop-icon { font-size: 40px; margin-bottom: 12px; }
.drop-text { font-size: 14px; color: var(--text2); margin-bottom: 6px; }
.drop-hint { font-size: 11px; color: var(--text3); }
.preview-wrap { display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap; }
.preview-img { max-width: 240px; max-height: 240px; border-radius: 8px; border: 1px solid var(--border2); object-fit: contain; }
.preview-info { flex:1;min-width:200px; }
.info-row { display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px; }
.info-row:last-child { border-bottom:none; }
.info-label { color:var(--text3); }
.info-val { color:var(--text); }
</style>
</head>
<body>
<div id="toast">✓ 已复制</div>
<div class="page-wrap">
  <nav class="top-nav">
    <a href="../index.html" class="back-btn">← 返回首页</a>
    <div class="nav-title">📦 Base64</div>
    <div class="nav-badge">#03</div>
  </nav>

  <div class="tool-header">
    <h1>Base64 编码 / 解码</h1>
    <p>文本与Base64互转，本地图片转Base64，实时转换，不上传服务器。</p>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('text', this)">文本转换</button>
    <button class="mode-tab" onclick="switchMode('image', this)">图片转 Base64</button>
  </div>

  <!-- Text Mode -->
  <div id="textMode">
    <div class="toolbar">
      <button class="btn btn-primary" onclick="encodeText()">编码 →</button>
      <button class="btn btn-secondary" onclick="decodeText()">← 解码</button>
      <button class="btn btn-secondary" onclick="swapText()">⇄ 交换</button>
      <button class="btn btn-secondary" onclick="copyOutput()">复制结果</button>
      <button class="btn btn-danger" onclick="clearText()">清空</button>
    </div>
    <div class="two-col">
      <div class="panel">
        <div class="panel-header"><span>// 输入</span></div>
        <textarea class="code-area" id="textInput" placeholder="输入文本或 Base64 字符串..." oninput="autoDetect()"></textarea>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span>// 结果</span>
          <div id="textStatus"></div>
        </div>
        <textarea class="code-area" id="textOutput" style="color:var(--green)" readonly placeholder="结果显示在这里..."></textarea>
      </div>
    </div>
    <div style="margin-top:12px">
      <div class="panel">
        <div class="panel-header"><span>// 统计信息</span></div>
        <div id="textStats" style="padding:12px 16px;font-size:12px;color:var(--text2)">输入内容后显示统计...</div>
      </div>
    </div>
  </div>

  <!-- Image Mode -->
  <div id="imageMode" style="display:none">
    <div class="image-drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" 
         ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
      <div class="drop-icon">🖼</div>
      <div class="drop-text">点击选择图片，或拖放到这里</div>
      <div class="drop-hint">支持 PNG / JPG / GIF / WebP / SVG</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">

    <div id="imageResult" style="display:none;margin-top:24px">
      <div style="margin-bottom:16px">
        <div class="preview-wrap">
          <img id="previewImg" class="preview-img" src="" alt="preview">
          <div class="preview-info">
            <div class="info-row"><span class="info-label">文件名</span><span class="info-val" id="imgName">-</span></div>
            <div class="info-row"><span class="info-label">文件大小</span><span class="info-val" id="imgSize">-</span></div>
            <div class="info-row"><span class="info-label">MIME 类型</span><span class="info-val" id="imgType">-</span></div>
            <div class="info-row"><span class="info-label">Base64 大小</span><span class="info-val" id="b64Size">-</span></div>
            <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-primary" onclick="copyBase64()">复制 Base64</button>
              <button class="btn btn-secondary" onclick="copyDataURL()">复制 Data URL</button>
              <button class="btn btn-secondary" onclick="copyImgTag()">复制 &lt;img&gt; 标签</button>
            </div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><span>// Base64 字符串</span></div>
        <textarea class="code-area" id="b64Output" style="color:var(--green);min-height:120px" readonly></textarea>
      </div>
    </div>
  </div>

  <div class="ad-footer">
    <div><strong>🚀 Pro 功能</strong> — 批量图片转Base64、拖放多文件、ZIP打包下载</div>
    <button class="ad-btn">了解 Pro →</button>
  </div>
</div>

<script>
let currentBase64 = '', currentMime = '';

function switchMode(mode, el) {
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('textMode').style.display = mode==='text' ? 'block' : 'none';
  document.getElementById('imageMode').style.display = mode==='image' ? 'block' : 'none';
}

function encodeText() {
  const v = document.getElementById('textInput').value;
  try {
    const encoded = btoa(unescape(encodeURIComponent(v)));
    document.getElementById('textOutput').value = encoded;
    setTextStatus('ok', '✓ 编码完成');
    updateStats(v, encoded);
  } catch(e) { setTextStatus('err', '✗ 编码失败'); }
}

function decodeText() {
  const v = document.getElementById('textInput').value.trim();
  try {
    const decoded = decodeURIComponent(escape(atob(v)));
    document.getElementById('textOutput').value = decoded;
    setTextStatus('ok', '✓ 解码完成');
    updateStats(v, decoded);
  } catch(e) { setTextStatus('err', '✗ 非有效 Base64'); }
}

function autoDetect() {
  const v = document.getElementById('textInput').value.trim();
  if (!v) { document.getElementById('textStats').textContent = '输入内容后显示统计...'; return; }
  const isB64 = /^[A-Za-z0-9+/]*={0,2}$/.test(v) && v.length % 4 === 0;
  if (isB64 && v.length > 8) decodeText();
  else encodeText();
}

function swapText() {
  const i = document.getElementById('textInput');
  const o = document.getElementById('textOutput');
  [i.value, o.value] = [o.value, i.value];
}

function updateStats(input, output) {
  document.getElementById('textStats').innerHTML = `
    <span style="margin-right:24px">输入: <span style="color:var(--text)">${input.length} 字符 / ${new Blob([input]).size} 字节</span></span>
    <span>输出: <span style="color:var(--text)">${output.length} 字符 / ${new Blob([output]).size} 字节</span></span>
    <span style="margin-left:24px">膨胀率: <span style="color:var(--accent2)">${(output.length/input.length*100).toFixed(0)}%</span></span>
  `;
}

function setTextStatus(t, m) {
  document.getElementById('textStatus').innerHTML = `<span class="status ${t}">${m}</span>`;
}

function copyOutput() {
  const v = document.getElementById('textOutput').value;
  if (v) navigator.clipboard.writeText(v).then(showToast);
}

function clearText() {
  document.getElementById('textInput').value = '';
  document.getElementById('textOutput').value = '';
  document.getElementById('textStatus').innerHTML = '';
  document.getElementById('textStats').textContent = '输入内容后显示统计...';
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.add('dragover');
}

function handleDragLeave(e) {
  document.getElementById('dropZone').classList.remove('dragover');
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    const parts = dataUrl.split(',');
    currentBase64 = parts[1];
    currentMime = file.type;
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('imgName').textContent = file.name;
    document.getElementById('imgSize').textContent = formatBytes(file.size);
    document.getElementById('imgType').textContent = file.type;
    document.getElementById('b64Size').textContent = formatBytes(currentBase64.length);
    document.getElementById('b64Output').value = currentBase64;
    document.getElementById('imageResult').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function copyBase64() {
  navigator.clipboard.writeText(currentBase64).then(showToast);
}

function copyDataURL() {
  navigator.clipboard.writeText(`data:${currentMime};base64,${currentBase64}`).then(showToast);
}

function copyImgTag() {
  navigator.clipboard.writeText(`<img src="data:${currentMime};base64,${currentBase64}" alt="image">`).then(showToast);
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(1) + ' MB';
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); convert(); }
});

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
