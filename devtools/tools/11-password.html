<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机字符串生成器 — DevKit</title>
<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8764762267426063" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared.css">
<style>
.strength-bar { height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin:8px 0; }
.strength-fill { height:100%;border-radius:2px;transition:all 0.3s; }
.strength-label { font-size:11px;margin-bottom:12px; }
.charset-grid { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px; }
.charset-item { display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.15s; }
.charset-item:hover { border-color:var(--border2); }
.charset-item.active { border-color:var(--accent);background:#f0f9ff; }
.charset-item input { accent-color:var(--accent); }
.charset-label { font-size:12px;color:var(--text2);flex:1; }
.charset-preview { font-size:10px;color:var(--text3); }
.len-slider { width:100%;accent-color:var(--accent);cursor:pointer; }
.result-big {
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:20px;font-size:14px;color:#15803d;word-break:break-all;line-height:1.7;
  min-height:60px;margin-bottom:8px;letter-spacing:0.5px;
  cursor:pointer;transition:border-color 0.2s;
}
.result-big:hover { border-color:var(--accent); }
.presets-row { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px; }
.preset-btn { padding:7px 14px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text2);transition:all 0.15s;letter-spacing:0.3px; }
.preset-btn:hover { border-color:var(--accent);color:var(--accent2); }
.batch-list { max-height:300px;overflow-y:auto;padding:8px; }
.batch-item { display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);margin-bottom:4px;font-size:12px; }
.batch-text { color:#15803d;flex:1;word-break:break-all; }
.batch-copy { background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:2px 6px;border-radius:3px;flex-shrink:0; }
.batch-copy:hover { color:var(--accent2); }
</style>
</head>
<body>
<div id="toast">✓ 已复制</div>
<div class="page-wrap">
  <nav class="top-nav">
    <a href="../index.html" class="back-btn">← 返回首页</a>
    <div class="nav-title">🔑 字符串生成器</div>
    <div class="nav-badge">#11</div>
  </nav>

  <div class="tool-header">
    <h1>随机字符串生成器</h1>
    <p>自定义长度、字符集，生成API密钥、Token、密码、加密盐。本地生成，不存储。</p>
  </div>

  <!-- Presets -->
  <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">// 快速预设</div>
  <div class="presets-row">
    <button class="preset-btn" onclick="applyPreset('password')">🔒 安全密码</button>
    <button class="preset-btn" onclick="applyPreset('apikey')">🔑 API Key</button>
    <button class="preset-btn" onclick="applyPreset('token')">🎫 Token (JWT格式)</button>
    <button class="preset-btn" onclick="applyPreset('hex')">💠 HEX Key</button>
    <button class="preset-btn" onclick="applyPreset('uuid-like')">🎲 UUID-like</button>
    <button class="preset-btn" onclick="applyPreset('numeric')">🔢 验证码 (6位)</button>
  </div>

  <div class="two-col">
    <!-- Controls -->
    <div>
      <div class="panel" style="margin-bottom:16px">
        <div class="panel-header"><span>// 配置</span></div>
        <div style="padding:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:12px;color:var(--text2)">长度</span>
            <span id="lenDisplay" style="font-size:16px;color:var(--accent2);font-weight:700">32</span>
          </div>
          <input type="range" class="len-slider" id="lengthSlider" min="4" max="256" value="32" oninput="updateLen()">
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px">
            <span>4</span><span>64</span><span>128</span><span>256</span>
          </div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">// 字符集</div>
      <div class="charset-grid">
        <label class="charset-item active" id="cs-upper">
          <input type="checkbox" checked onchange="toggleCharset('upper',this)">
          <div><div class="charset-label">大写字母</div><div class="charset-preview">A-Z</div></div>
        </label>
        <label class="charset-item active" id="cs-lower">
          <input type="checkbox" checked onchange="toggleCharset('lower',this)">
          <div><div class="charset-label">小写字母</div><div class="charset-preview">a-z</div></div>
        </label>
        <label class="charset-item active" id="cs-numbers">
          <input type="checkbox" checked onchange="toggleCharset('numbers',this)">
          <div><div class="charset-label">数字</div><div class="charset-preview">0-9</div></div>
        </label>
        <label class="charset-item" id="cs-special">
          <input type="checkbox" onchange="toggleCharset('special',this)">
          <div><div class="charset-label">特殊字符</div><div class="charset-preview">!@#$%^&*()</div></div>
        </label>
        <label class="charset-item" id="cs-hex">
          <input type="checkbox" onchange="toggleCharset('hex',this)">
          <div><div class="charset-label">HEX 字符</div><div class="charset-preview">0-9A-F</div></div>
        </label>
        <label class="charset-item" id="cs-base64safe">
          <input type="checkbox" onchange="toggleCharset('base64safe',this)">
          <div><div class="charset-label">Base64 Safe</div><div class="charset-preview">A-Z a-z 0-9 -_</div></div>
        </label>
      </div>
      <div style="margin-bottom:8px">
        <div style="font-size:11px;color:var(--text3);margin-bottom:6px">自定义字符集</div>
        <input type="text" id="customCharset" placeholder="输入自定义字符..." style="width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none">
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:6px">批量生成数量</div>
      <input type="number" id="batchCount" value="1" min="1" max="100" style="width:80px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none">
    </div>

    <!-- Result -->
    <div>
      <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">// 生成结果</div>
      <div class="result-big" id="singleResult" onclick="copyResult()" title="点击复制">点击「生成」按钮...</div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
      <div class="toolbar" style="margin-bottom:16px">
        <button class="btn btn-primary" onclick="generate()">⚡ 生成</button>
        <button class="btn btn-secondary" onclick="copyResult()">复制</button>
        <button class="btn btn-secondary" onclick="generateBatch()">批量生成</button>
      </div>
      <div class="panel" id="batchPanel" style="display:none">
        <div class="panel-header">
          <span>// 批量结果</span>
          <button class="btn btn-secondary" style="padding:3px 8px;font-size:11px" onclick="copyAllBatch()">复制全部</button>
        </div>
        <div class="batch-list" id="batchList"></div>
      </div>
    </div>
  </div>

  <div class="ad-footer">
    <div><strong>🚀 Pro 功能</strong> — 无广告模式、导出CSV、自定义模板格式</div>
    <button class="ad-btn">了解 Pro →</button>
  </div>
</div>

<script>
const CHARSETS = {
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower: 'abcdefghijklmnopqrstuvwxyz',
  numbers: '0123456789',
  special: '!@#$%^&*()-_=+[]{}|;:,.<>?',
  hex: '0123456789ABCDEF',
  base64safe: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_',
};
const active = new Set(['upper','lower','numbers']);
let batchResults = [];

function toggleCharset(key, el) {
  if (el.checked) active.add(key);
  else active.delete(key);
  document.getElementById('cs-'+key).classList.toggle('active', el.checked);
}

function getCharset() {
  const custom = document.getElementById('customCharset').value;
  if (custom) return custom;
  let chars = '';
  active.forEach(k => chars += CHARSETS[k]);
  return chars || 'abcdefghijklmnopqrstuvwxyz0123456789';
}

function generateStr(len) {
  const chars = getCharset();
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr, v => chars[v % chars.length]).join('');
}

function generate() {
  const len = parseInt(document.getElementById('lengthSlider').value);
  const result = generateStr(len);
  document.getElementById('singleResult').textContent = result;
  updateStrength(result);
}

function updateLen() {
  document.getElementById('lenDisplay').textContent = document.getElementById('lengthSlider').value;
}

function updateStrength(s) {
  let score = 0;
  if (s.length >= 8) score++;
  if (s.length >= 16) score++;
  if (s.length >= 32) score++;
  if (/[A-Z]/.test(s)) score++;
  if (/[a-z]/.test(s)) score++;
  if (/[0-9]/.test(s)) score++;
  if (/[^A-Za-z0-9]/.test(s)) score++;
  const levels = [{c:'var(--red)',l:'弱',w:'20%'},{c:'var(--orange)',l:'一般',w:'40%'},{c:'var(--yellow)',l:'中等',w:'60%'},{c:'var(--green)',l:'强',w:'80%'},{c:'var(--green)',l:'非常强',w:'100%'}];
  const lvl = levels[Math.min(Math.floor(score/1.5), 4)];
  document.getElementById('strengthFill').style.cssText = `background:${lvl.c};width:${lvl.w}`;
  document.getElementById('strengthLabel').innerHTML = `<span style="color:${lvl.c}">强度: ${lvl.l}</span> <span style="color:var(--text3);margin-left:12px">信息熵: ~${Math.round(s.length * Math.log2(getCharset().length))} bits</span>`;
}

function generateBatch() {
  const count = Math.min(100, Math.max(1, parseInt(document.getElementById('batchCount').value)||1));
  const len = parseInt(document.getElementById('lengthSlider').value);
  batchResults = Array.from({length:count}, () => generateStr(len));
  if (count === 1) { document.getElementById('singleResult').textContent = batchResults[0]; updateStrength(batchResults[0]); return; }
  document.getElementById('batchPanel').style.display = 'block';
  document.getElementById('batchList').innerHTML = batchResults.map((s,i) => {
    const escaped = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="batch-item"><span class="batch-text" data-val="${escaped}">${escaped}</span><button class="batch-copy" onclick="copyBatchItem(this)">复制</button></div>`;
  }).join('');
}

function copyAllBatch() {
  if (batchResults.length) navigator.clipboard.writeText(batchResults.join('\n')).then(showToast);
}

function copyResult() {
  const v = document.getElementById('singleResult').textContent;
  if (v && v !== '点击「生成」按钮...') navigator.clipboard.writeText(v).then(showToast);
}

const PRESETS = {
  password: {len:16, sets:['upper','lower','numbers','special']},
  apikey: {len:32, sets:['upper','lower','numbers'], custom:''},
  token: {len:64, sets:['upper','lower','numbers'], custom:''},
  hex: {len:32, sets:['hex'], custom:''},
  'uuid-like': {len:32, sets:[], custom:'0123456789abcdef'},
  numeric: {len:6, sets:['numbers'], custom:''},
};

function applyPreset(name) {
  const p = PRESETS[name];
  document.getElementById('lengthSlider').value = p.len;
  document.getElementById('lenDisplay').textContent = p.len;
  // Reset
  active.clear();
  Object.keys(CHARSETS).forEach(k => {
    const el = document.querySelector(`#cs-${k} input`);
    const card = document.getElementById('cs-'+k);
    if (p.sets.includes(k)) { active.add(k); el.checked=true; card.classList.add('active'); }
    else { el.checked=false; card.classList.remove('active'); }
  });
  document.getElementById('customCharset').value = p.custom||'';
  generate();
}

function copyBatchItem(btn) {
  const val = btn.previousElementSibling.dataset.val || btn.previousElementSibling.textContent;
  navigator.clipboard.writeText(val).then(showToast);
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

generate();
</script>
</body>
</html>
