<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间戳工具 — DevKit</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared.css">
<style>
.big-clock {
  font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,64px);font-weight:800;
  color:var(--accent2);letter-spacing:-1px;text-align:center;padding:32px;
  line-height:1;
}
.ts-display { font-size:14px;color:var(--text3);text-align:center;margin-bottom:8px; }
.ts-nums { display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin-bottom:32px; }
.ts-num-item { text-align:center; }
.ts-val { font-size:22px;color:#92400e;font-weight:700;cursor:pointer;transition:color 0.15s; }
.ts-val:hover { color:var(--accent2); }
.ts-label { font-size:10px;color:var(--text3);letter-spacing:1px;margin-top:4px; }
.convert-section { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
.convert-card { background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px; }
.convert-title { font-size:12px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px; }
.big-input { width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:16px;outline:none;transition:border-color 0.2s; }
.big-input:focus { border-color:var(--accent); }
.result-rows { margin-top:12px; }
.result-row { display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;gap:12px; }
.result-row:last-child { border-bottom:none; }
.result-label { color:var(--text3);flex-shrink:0; }
.result-value { color:var(--green);word-break:break-all;text-align:right; }
.copy-inline { background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:2px 6px;border-radius:3px;transition:all 0.15s;flex-shrink:0; }
.copy-inline:hover { color:var(--accent2);background:#eff6ff; }
@media (max-width:600px) { .convert-section { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div id="toast">✓ 已复制</div>
<div class="page-wrap">
  <nav class="top-nav">
    <a href="../index.html" class="back-btn">← 返回首页</a>
    <div class="nav-title">⏱ 时间戳工具</div>
    <div class="nav-badge">#06</div>
  </nav>

  <div class="tool-header">
    <h1>时间戳互转工具</h1>
    <p>10位/13位时间戳与日期时间互转，支持本地时间与UTC时间，实时刷新。</p>
  </div>

  <!-- Live Clock -->
  <div class="panel" style="margin-bottom:24px">
    <div class="panel-header"><span>// 当前时间</span><button class="btn btn-secondary" style="padding:4px 10px;font-size:11px" onclick="copyCurrentTs()">复制时间戳</button></div>
    <div class="big-clock" id="clockDisplay">00:00:00</div>
    <div class="ts-nums">
      <div class="ts-num-item">
        <div class="ts-val" id="ts10" onclick="copyTs(10)" title="点击复制">—</div>
        <div class="ts-label">10位 (秒)</div>
      </div>
      <div class="ts-num-item">
        <div class="ts-val" id="ts13" onclick="copyTs(13)" title="点击复制">—</div>
        <div class="ts-label">13位 (毫秒)</div>
      </div>
    </div>
  </div>

  <div class="convert-section">
    <!-- Timestamp to Date -->
    <div class="convert-card">
      <div class="convert-title">// 时间戳 → 日期时间</div>
      <input class="big-input" id="tsInput" type="text" placeholder="输入时间戳 (10位或13位)" oninput="ts2date()">
      <div class="result-rows" id="ts2dateResult"></div>
    </div>

    <!-- Date to Timestamp -->
    <div class="convert-card">
      <div class="convert-title">// 日期时间 → 时间戳</div>
      <input class="big-input" id="dateInput" type="datetime-local" oninput="date2ts()">
      <div class="result-rows" id="date2tsResult"></div>
    </div>
  </div>

  <div class="ad-footer">
    <div><strong>🚀 Pro 功能</strong> — 时区转换、时间计算、Cron时间预览</div>
    <button class="ad-btn">了解 Pro →</button>
  </div>
</div>

<script>
function pad(n) { return String(n).padStart(2,'0'); }

function formatDate(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

function formatDateUTC(d) {
  return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())} UTC`;
}

function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('ts10').textContent = Math.floor(now.getTime()/1000);
  document.getElementById('ts13').textContent = now.getTime();
}

setInterval(updateClock, 1000);
updateClock();

// Set default date input to now
const now = new Date();
const localIso = new Date(now.getTime() - now.getTimezoneOffset()*60000).toISOString().slice(0,16);
document.getElementById('dateInput').value = localIso;
date2ts();

function ts2date() {
  let v = document.getElementById('tsInput').value.trim();
  if (!v) { document.getElementById('ts2dateResult').innerHTML = ''; return; }
  let ts = parseInt(v);
  if (isNaN(ts)) { document.getElementById('ts2dateResult').innerHTML = '<div style="color:var(--red);font-size:12px">无效时间戳</div>'; return; }
  if (v.length <= 10) ts *= 1000;
  const d = new Date(ts);
  const tz = -(d.getTimezoneOffset()/60);
  document.getElementById('ts2dateResult').innerHTML = `
    ${row('本地时间', formatDate(d))}
    ${row('UTC 时间', formatDateUTC(d))}
    ${row('ISO 8601', d.toISOString())}
    ${row('时区偏移', `UTC${tz>=0?'+':''}${tz}`)}
    ${row('星期', ['日','一','二','三','四','五','六'][d.getDay()])}
    ${row('Unix(秒)', Math.floor(ts/1000))}
    ${row('Unix(毫秒)', ts)}
  `;
}

function date2ts() {
  const v = document.getElementById('dateInput').value;
  if (!v) return;
  const d = new Date(v);
  document.getElementById('date2tsResult').innerHTML = `
    ${row('10位时间戳', Math.floor(d.getTime()/1000))}
    ${row('13位时间戳', d.getTime())}
    ${row('ISO 8601', d.toISOString())}
    ${row('UTC 时间', formatDateUTC(d))}
  `;
}

function row(label, val) {
  const escaped = String(val).replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="result-row">
    <span class="result-label">${label}</span>
    <span style="display:flex;align-items:center;gap:4px">
      <span class="result-value">${escaped}</span>
      <button class="copy-inline" data-val="${escaped}" onclick="copyText(this.dataset.val)">复制</button>
    </span>
  </div>`;
}

function copyText(v) {
  navigator.clipboard.writeText(String(v)).then(showToast);
}

function copyTs(size) {
  const now = Date.now();
  const ts = size === 10 ? Math.floor(now/1000) : now;
  navigator.clipboard.writeText(String(ts)).then(showToast);
}

function copyCurrentTs() {
  navigator.clipboard.writeText(String(Math.floor(Date.now()/1000))).then(showToast);
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
