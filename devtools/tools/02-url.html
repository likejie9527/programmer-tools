<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL 编码/解码 — DevKit</title>
<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8764762267426063" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared.css">
<style>
.params-table { width:100%; border-collapse:collapse; margin-top:8px; }
.params-table th {
  padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text3);text-align:left;border-bottom:1px solid var(--border);
}
.params-table td {
  padding:10px 12px;font-size:12px;border-bottom:1px solid var(--border);
  word-break:break-all;vertical-align:top;
}
.params-table tr:last-child td { border-bottom:none; }
.param-key { color:var(--accent2); }
.param-val { color:var(--green); }
.url-parts { padding:16px; }
.url-part { margin-bottom:12px; }
.url-part-label { font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px; }
.url-part-val { font-size:13px;color:var(--text);word-break:break-all; }
.url-part-val.highlight { color:var(--cyan); }
.mode-tabs { display:flex;gap:8px;margin-bottom:20px; }
.mode-tab { padding:8px 20px;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text3);transition:all 0.15s; }
.mode-tab.active { background:var(--accent);color:white;border-color:var(--accent); }
</style>
</head>
<body>
<div id="toast">✓ 已复制</div>
<div class="page-wrap">
  <nav class="top-nav">
    <a href="../index.html" class="back-btn">← 返回首页</a>
    <div class="nav-title">🔗 URL 编码/解码</div>
    <div class="nav-badge">#02</div>
  </nav>

  <div class="tool-header">
    <h1>URL 编码 / 解码</h1>
    <p>URL编码解码、自动解析QueryString参数、解析URL各部分结构。</p>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="switchMode('encode', this)">编码 / 解码</button>
    <button class="mode-tab" onclick="switchMode('parse', this)">URL 解析</button>
  </div>

  <!-- Encode/Decode Mode -->
  <div id="encodeMode">
    <div class="toolbar">
      <button class="btn btn-primary" onclick="doEncode()">编码</button>
      <button class="btn btn-secondary" onclick="doDecode()">解码</button>
      <button class="btn btn-secondary" onclick="copyResult()">复制结果</button>
      <button class="btn btn-danger" onclick="clearAll()">清空</button>
      <label style="margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);cursor:pointer">
        <input type="checkbox" id="fullEncode" style="accent-color:var(--accent)"> 完整编码(encodeURIComponent)
      </label>
    </div>
    <div class="two-col">
      <div class="panel">
        <div class="panel-header"><span>// 输入</span></div>
        <textarea class="code-area" id="inputText" placeholder="输入要编码或解码的文本..." oninput="autoConvert()"></textarea>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span>// 结果</span>
          <div id="encodeStatus"></div>
        </div>
        <div class="result-area" id="outputText" style="color:var(--green)"></div>
      </div>
    </div>
    <div style="margin-top:24px">
      <div class="panel">
        <div class="panel-header"><span>// QueryString 参数解析</span></div>
        <div class="url-parts" id="paramsArea">
          <p style="font-size:12px;color:var(--text3)">在输入框中粘贴包含 ? 的URL或直接输入query参数，将自动解析...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Parse Mode -->
  <div id="parseMode" style="display:none">
    <div class="toolbar">
      <button class="btn btn-primary" onclick="parseURL()">解析 URL</button>
      <button class="btn btn-danger" onclick="clearParse()">清空</button>
    </div>
    <div class="panel" style="margin-bottom:16px">
      <div class="panel-header"><span>// 输入完整 URL</span></div>
      <textarea class="code-area" id="urlInput" style="min-height:80px" placeholder="https://example.com/path?name=DevKit&version=1#section" oninput="parseURL()"></textarea>
    </div>
    <div class="panel" id="urlParseResult" style="display:none">
      <div class="panel-header"><span>// URL 结构解析</span></div>
      <div class="url-parts" id="urlPartsArea"></div>
      <div class="panel-header" style="border-top:1px solid var(--border);border-bottom:1px solid var(--border)"><span>// 参数列表</span></div>
      <div id="urlParamsArea" style="padding:8px 0"></div>
    </div>
  </div>

  <div class="ad-footer">
    <div><strong>🚀 Pro 功能</strong> — 批量URL处理、cURL转换、接口测试工具</div>
    <button class="ad-btn">了解 Pro →</button>
  </div>
</div>

<script>
function switchMode(mode, el) {
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('encodeMode').style.display = mode==='encode' ? 'block' : 'none';
  document.getElementById('parseMode').style.display = mode==='parse' ? 'block' : 'none';
}

function doEncode() {
  const v = document.getElementById('inputText').value;
  const full = document.getElementById('fullEncode').checked;
  const result = full ? encodeURIComponent(v) : encodeURI(v);
  document.getElementById('outputText').textContent = result;
  setStatus('ok', '✓ 编码完成');
  parseParams(v);
}

function doDecode() {
  const v = document.getElementById('inputText').value;
  try {
    const result = decodeURIComponent(v.replace(/\+/g, ' '));
    document.getElementById('outputText').textContent = result;
    setStatus('ok', '✓ 解码完成');
    parseParams(result);
  } catch(e) {
    setStatus('err', '✗ 解码失败');
  }
}

function autoConvert() {
  const v = document.getElementById('inputText').value;
  parseParams(v);
}

function parseParams(text) {
  let queryStr = text;
  if (text.includes('?')) queryStr = text.split('?')[1];
  if (queryStr.includes('#')) queryStr = queryStr.split('#')[0];
  const area = document.getElementById('paramsArea');
  if (!queryStr || !queryStr.includes('=')) {
    area.innerHTML = '<p style="font-size:12px;color:var(--text3)">在输入框中粘贴包含 ? 的URL或直接输入query参数，将自动解析...</p>';
    return;
  }
  try {
    const params = new URLSearchParams(queryStr);
    let rows = '';
    params.forEach((val, key) => {
      rows += `<tr><td class="param-key">${escHtml(key)}</td><td class="param-val">${escHtml(decodeURIComponent(val))}</td><td style="color:var(--text3)">${escHtml(val)}</td></tr>`;
    });
    area.innerHTML = `<table class="params-table"><thead><tr><th>参数名</th><th>解码值</th><th>原始值</th></tr></thead><tbody>${rows}</tbody></table>`;
  } catch(e) {}
}

function parseURL() {
  const v = document.getElementById('urlInput').value.trim();
  if (!v) return;
  try {
    let url;
    try { url = new URL(v); } catch { url = new URL('https://' + v); }
    const result = document.getElementById('urlParseResult');
    result.style.display = 'block';
    document.getElementById('urlPartsArea').innerHTML = `
      <div class="url-part"><div class="url-part-label">协议</div><div class="url-part-val highlight">${url.protocol}</div></div>
      <div class="url-part"><div class="url-part-label">主机</div><div class="url-part-val highlight">${url.hostname}</div></div>
      ${url.port ? `<div class="url-part"><div class="url-part-label">端口</div><div class="url-part-val highlight">${url.port}</div></div>` : ''}
      <div class="url-part"><div class="url-part-label">路径</div><div class="url-part-val">${url.pathname || '/'}</div></div>
      ${url.search ? `<div class="url-part"><div class="url-part-label">查询字符串</div><div class="url-part-val">${url.search}</div></div>` : ''}
      ${url.hash ? `<div class="url-part"><div class="url-part-label">锚点</div><div class="url-part-val">${url.hash}</div></div>` : ''}
    `;
    if (url.search) {
      const params = new URLSearchParams(url.search);
      let rows = '';
      params.forEach((val, key) => {
        rows += `<tr><td class="param-key">${escHtml(key)}</td><td class="param-val">${escHtml(decodeURIComponent(val))}</td></tr>`;
      });
      document.getElementById('urlParamsArea').innerHTML = `<table class="params-table"><thead><tr><th>参数名</th><th>值</th></tr></thead><tbody>${rows}</tbody></table>`;
    } else {
      document.getElementById('urlParamsArea').innerHTML = '<p style="font-size:12px;color:var(--text3);padding:12px 16px">无查询参数</p>';
    }
  } catch(e) {}
}

function setStatus(t, m) {
  document.getElementById('encodeStatus').innerHTML = `<span class="status ${t}">${m}</span>`;
}

function copyResult() {
  const t = document.getElementById('outputText').textContent;
  if (t) navigator.clipboard.writeText(t).then(showToast);
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('outputText').textContent = '';
  document.getElementById('encodeStatus').innerHTML = '';
  document.getElementById('paramsArea').innerHTML = '<p style="font-size:12px;color:var(--text3)">在输入框中粘贴包含 ? 的URL或直接输入query参数，将自动解析...</p>';
}

function clearParse() {
  document.getElementById('urlInput').value = '';
  document.getElementById('urlParseResult').style.display = 'none';
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
