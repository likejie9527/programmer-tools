<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 预览 — DevKit</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/shared.css">
<style>
.editor-layout { display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;min-height:520px; }
.editor-pane { display:flex;flex-direction:column;border-right:1px solid var(--border); }
.preview-pane { display:flex;flex-direction:column;overflow:hidden; }
.pane-header { padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;color:var(--text3);letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }
#mdEditor { flex:1;background:transparent;border:none;padding:20px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.8;resize:none;outline:none;tab-size:2; }
.preview-body { flex:1;padding:24px;overflow-y:auto;font-family:'Georgia','Times New Roman',serif;font-size:15px;line-height:1.8;color:var(--text); }
/* Markdown Preview Styles */
.preview-body h1,.preview-body h2,.preview-body h3,.preview-body h4 { font-family:'Syne',sans-serif;margin:1.5em 0 0.5em;line-height:1.3; }
.preview-body h1 { font-size:2em;border-bottom:1px solid var(--border);padding-bottom:0.3em; }
.preview-body h2 { font-size:1.5em;border-bottom:1px solid var(--border);padding-bottom:0.2em; }
.preview-body h3 { font-size:1.25em; }
.preview-body p { margin:0.8em 0; }
.preview-body code { background:var(--surface2);color:var(--orange);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:0.9em; }
.preview-body pre { background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:16px;overflow:auto;margin:1em 0; }
.preview-body pre code { background:none;padding:0;color:var(--green); }
.preview-body blockquote { border-left:3px solid var(--accent);margin:1em 0;padding:8px 16px;background:#f0f9ff;color:var(--text2); }
.preview-body a { color:var(--accent2);text-decoration:none; }
.preview-body a:hover { text-decoration:underline; }
.preview-body ul,.preview-body ol { margin:0.5em 0;padding-left:2em; }
.preview-body li { margin:0.3em 0; }
.preview-body table { width:100%;border-collapse:collapse;margin:1em 0; }
.preview-body th { background:var(--surface2);padding:8px 12px;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2); }
.preview-body td { padding:8px 12px;border:1px solid var(--border);font-size:14px; }
.preview-body tr:nth-child(even) td { background:rgba(255,255,255,0.02); }
.preview-body img { max-width:100%;border-radius:6px; }
.preview-body hr { border:none;border-top:1px solid var(--border);margin:2em 0; }
.preview-body strong { color:var(--text);font-weight:700; }
.preview-body em { color:var(--text2); }
.preview-body del { color:var(--text3); }
.toolbar-mini { display:flex;gap:4px; }
.tb-btn { background:none;border:1px solid var(--border2);border-radius:4px;padding:3px 8px;color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s; }
.tb-btn:hover { color:var(--text);border-color:var(--accent); }
@media (max-width:700px) { .editor-layout { grid-template-columns:1fr;grid-template-rows:1fr 1fr; } .editor-pane { border-right:none;border-bottom:1px solid var(--border); } }
</style>
</head>
<body>
<div id="toast">✓ 已复制</div>
<div class="page-wrap">
  <nav class="top-nav">
    <a href="../index.html" class="back-btn">← 返回首页</a>
    <div class="nav-title">📝 Markdown 预览</div>
    <div class="nav-badge">#13</div>
  </nav>

  <div class="tool-header">
    <h1>Markdown 实时预览</h1>
    <p>左侧编辑、右侧实时预览，支持GFM完整语法，一键导出HTML。</p>
  </div>

  <div class="toolbar" style="margin-bottom:12px">
    <button class="btn btn-primary" onclick="insertTemplate('bold')"><b>B</b></button>
    <button class="btn btn-secondary" onclick="insertTemplate('italic')"><i>I</i></button>
    <button class="btn btn-secondary" onclick="insertTemplate('code')">`code`</button>
    <button class="btn btn-secondary" onclick="insertTemplate('codeblock')">```</button>
    <button class="btn btn-secondary" onclick="insertTemplate('link')">🔗</button>
    <button class="btn btn-secondary" onclick="insertTemplate('image')">🖼</button>
    <button class="btn btn-secondary" onclick="insertTemplate('table')">⊞ 表格</button>
    <button class="btn btn-secondary" onclick="insertTemplate('hr')">HR</button>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-secondary" onclick="copyMarkdown()">复制 MD</button>
      <button class="btn btn-secondary" onclick="copyHTML()">复制 HTML</button>
      <button class="btn btn-secondary" onclick="exportHTML()">导出 HTML</button>
      <button class="btn btn-danger" onclick="clearEditor()">清空</button>
    </div>
  </div>

  <div class="editor-layout">
    <div class="editor-pane">
      <div class="pane-header">
        <span>// Markdown 编辑</span>
        <span id="wordCount" style="color:var(--text3)"></span>
      </div>
      <textarea id="mdEditor" placeholder="在这里输入 Markdown..." oninput="render()" onkeydown="handleTab(event)"></textarea>
    </div>
    <div class="preview-pane">
      <div class="pane-header">
        <span>// 预览</span>
        <button class="tb-btn" onclick="toggleFullscreen()">全屏预览</button>
      </div>
      <div class="preview-body" id="preview"></div>
    </div>
  </div>

  <div class="ad-footer">
    <div><strong>🚀 Pro 功能</strong> — 导出 PDF、导出 Word、图片上传、协作编辑</div>
    <button class="ad-btn">了解 Pro →</button>
  </div>
</div>

<script>
const SAMPLE = `# DevKit Markdown 编辑器

欢迎使用 **DevKit** 的 Markdown 实时预览工具！

## 特性

- ✅ 实时预览，输入即渲染
- ✅ 支持完整 GFM 语法
- ✅ 一键复制 HTML
- ✅ 代码高亮

## 代码示例

\`\`\`javascript
function hello(name) {
  console.log(\`Hello, \${name}!\`);
}
hello("DevKit");
\`\`\`

## 表格

| 工具 | 类型 | 状态 |
|------|------|------|
| JSON 格式化 | 数据处理 | ✅ |
| UUID 生成器 | 工具类 | ✅ |
| 正则测试 | 调试 | ✅ |

## 引用

> 好的工具能让开发效率翻倍，而无需任何后端支持。

---

*DevKit — 程序员工具箱*
`;

document.getElementById('mdEditor').value = SAMPLE;

function render() {
  const md = document.getElementById('mdEditor').value;
  document.getElementById('preview').innerHTML = parseMarkdown(md);
  const words = md.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('wordCount').textContent = `${words} 词 / ${md.length} 字符`;
}

function escMd(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseMarkdown(md) {
  // First fully escape all HTML to prevent XSS
  let html = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Code blocks (before inline code) — content already escaped
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="lang-${lang || 'text'}">${code}</code></pre>`);
  // Headings
  html = html.replace(/^#{6}\s(.+)$/gm,'<h6>$1</h6>');
  html = html.replace(/^#{5}\s(.+)$/gm,'<h5>$1</h5>');
  html = html.replace(/^#{4}\s(.+)$/gm,'<h4>$1</h4>');
  html = html.replace(/^#{3}\s(.+)$/gm,'<h3>$1</h3>');
  html = html.replace(/^#{2}\s(.+)$/gm,'<h2>$1</h2>');
  html = html.replace(/^#{1}\s(.+)$/gm,'<h1>$1</h1>');
  // HR
  html = html.replace(/^---+$/gm,'<hr>');
  // Blockquotes
  html = html.replace(/^&gt;\s?(.+)$/gm,'<blockquote>$1</blockquote>');
  // Unordered lists
  html = html.replace(/^[\*\-\+]\s(.+)$/gm,'<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
  html = html.replace(/<\/ul>\s*<ul>/g,'');
  // Ordered lists
  html = html.replace(/^\d+\.\s(.+)$/gm,'<li>$1</li>');
  // Tables
  html = html.replace(/(\|.+\|\n\|[-| :]+\|\n(\|.+\|\n?)+)/g, tableStr => {
    const rows = tableStr.trim().split('\n');
    const headers = rows[0].split('|').filter(c=>c.trim());
    const body = rows.slice(2).map(r => r.split('|').filter(c=>c.trim()));
    const thead = '<thead><tr>' + headers.map(h=>`<th>${h.trim()}</th>`).join('') + '</tr></thead>';
    const tbody = '<tbody>' + body.map(r=>'<tr>'+r.map(c=>`<td>${c.trim()}</td>`).join('')+'</tr>').join('') + '</tbody>';
    return `<table>${thead}${tbody}</table>`;
  });
  // Inline styles
  html = html.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html = html.replace(/__(.+?)__/g,'<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g,'<em>$1</em>');
  html = html.replace(/_(.+?)_/g,'<em>$1</em>');
  html = html.replace(/~~(.+?)~~/g,'<del>$1</del>');
  html = html.replace(/`([^`]+)`/g,'<code>$1</code>');
  // Links and images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Paragraphs
  html = html.replace(/\n\n+/g,'</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>(<h[1-6]>|<ul>|<ol>|<blockquote>|<pre>|<table>|<hr>)/g,'$1');
  html = html.replace(/(<\/h[1-6]>|<\/ul>|<\/ol>|<\/blockquote>|<\/pre>|<\/table>|<hr>)<\/p>/g,'$1');
  html = html.replace(/<p><\/p>/g,'');
  return html;
}

function insertTemplate(type) {
  const el = document.getElementById('mdEditor');
  const start = el.selectionStart, end = el.selectionEnd;
  const sel = el.value.substring(start, end);
  const templates = {
    bold: `**${sel||'粗体文字'}**`,
    italic: `*${sel||'斜体文字'}*`,
    code: '`' + (sel||'code') + '`',
    codeblock: `\`\`\`javascript\n${sel||'// code here'}\n\`\`\``,
    link: `[${sel||'链接文字'}](https://example.com)`,
    image: `![${sel||'图片描述'}](https://via.placeholder.com/300x200)`,
    table: `| 列1 | 列2 | 列3 |\n|-----|-----|-----|\n| 值1 | 值2 | 值3 |\n| 值4 | 值5 | 值6 |`,
    hr: '\n---\n',
  };
  const insert = templates[type];
  el.value = el.value.substring(0,start) + insert + el.value.substring(end);
  el.selectionStart = el.selectionEnd = start + insert.length;
  el.focus();
  render();
}

function handleTab(e) {
  if (e.key==='Tab') {
    e.preventDefault();
    const el = e.target, s=el.selectionStart;
    el.value = el.value.substring(0,s)+'  '+el.value.substring(el.selectionEnd);
    el.selectionStart = el.selectionEnd = s+2;
  }
}

function copyMarkdown() {
  navigator.clipboard.writeText(document.getElementById('mdEditor').value).then(showToast);
}

function copyHTML() {
  navigator.clipboard.writeText(document.getElementById('preview').innerHTML).then(showToast);
}

function exportHTML() {
  const body = document.getElementById('preview').innerHTML;
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Markdown Export</title><style>body{font-family:Georgia,serif;max-width:800px;margin:0 auto;padding:32px;line-height:1.8;color:#333}pre{background:#f5f5f5;padding:16px;border-radius:8px;overflow:auto}code{background:#f0f0f0;padding:2px 6px;border-radius:4px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px}blockquote{border-left:3px solid #7c6aff;margin:0;padding-left:16px;color:#666}</style></head><body>${body}</body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'export.html';
  a.click();
}

function clearEditor() {
  document.getElementById('mdEditor').value='';
  render();
}

function toggleFullscreen() {
  const p = document.getElementById('preview').parentElement;
  p.style.position = p.style.position==='fixed' ? '' : 'fixed';
  p.style.inset = p.style.inset==='0px' ? '' : '0';
  p.style.zIndex = p.style.zIndex==='9999' ? '' : '9999';
  p.style.background = p.style.background ? '' : 'var(--bg)';
  p.style.padding = p.style.padding ? '' : '32px';
  p.style.overflow = p.style.overflow ? '' : 'auto';
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

render();
</script>
</body>
</html>
